---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jurisd
  namespace: jurisd
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  tls:
    - hosts:
        - jurisd.example.com
      secretName: jurisd-tls
  rules:
    - host: jurisd.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jurisd
                port:
                  number: 3000
